<!DOCTYPE html>
<html>
<head><title>GASテスト</title></head>
<body>
  <h1>データ送信テスト</h1>
  <button onclick="send()">スプレッドシートに保存</button>

  <script>
    async function send() {
      // ★ここに、メモしたGASのウェブアプリURLを貼り付けてください
      const url = "https://script.google.com/macros/s/AKfycbxkYt0fIzpBRHNa5XYQHdcSL1YO9zDVqF-ZrV2p6ntEeJ5w-9Yi7irOoC4WVLD4XjcFGA/exec";
      
      const data = {
        username: "テストユーザー",
        score: "100%"
      };

      // GASにデータを飛ばす魔法の呪文
      fetch(url, {
        method: "POST",
        mode: "no-cors", // これを入れるとエラーが出にくくなります
        body: JSON.stringify(data)
      });
      
      alert("送信しました！スプレッドシートを確認してください。");
    }
  </script>
</body>
</html>
