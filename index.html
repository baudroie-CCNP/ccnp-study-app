<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCNP 虎の巻 - 秘伝演習 -</title>
    <style>
        /* --- 基本設定 --- */
        :root {
            --paper-color: #f2e8d5; /* 和紙のような生成り色 */
            --ink-black: #2b2b2b;   /* 墨色 */
            --shuiro: #e63946;     /* 朱色（印鑑の色） */
            --gold: #b89c5e;       /* 金泥色 */
            --border-ink: #3d3d3d;
        }

        body {
            background-color: #333; /* 背景は暗い木の机のような色 */
            background-image: url('https://www.transparenttextures.com/patterns/dark-wood.png');
            color: var(--ink-black);
            font-family: "Hiragino Mincho ProN", "MS Mincho", serif; /* 明朝体で和の雰囲気を */
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* --- 巻物風コンテナ --- */
        .scroll-container {
            background-color: var(--paper-color);
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png'); /* 和紙テクスチャ */
            width: 90%;
            max-width: 550px;
            padding: 60px 50px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            position: relative;
            border-left: 15px solid var(--gold);
            border-right: 15px solid var(--gold);
            border-radius: 5px;
        }

        /* --- タイトルエリア --- */
        .header {
            border-bottom: 2px double var(--border-ink);
            margin-bottom: 40px;
            padding-bottom: 20px;
            position: relative;
        }

        /* 落款（はんこ）風の装飾 */
        .hanko {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 50px;
            height: 50px;
            border: 3px solid var(--shuiro);
            color: var(--shuiro);
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(15deg);
            font-family: sans-serif;
            border-radius: 3px;
            opacity: 0.8;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: 0.2em;
            font-weight: 900;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .subtitle {
            font-size: 0.9rem;
            color: #666;
            margin-top: 10px;
            letter-spacing: 0.1em;
        }

        /* --- メニューエリア --- */
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .menu-item {
            text-decoration: none;
            color: var(--ink-black);
            display: flex;
            align-items: center;
            padding: 15px;
            border: 1px solid transparent;
            transition: all 0.3s;
            position: relative;
        }

        /* ホバー時に筆で線を引いたような演出 */
        .menu-item::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: var(--ink-black);
            transition: all 0.4s;
            transform: translateX(-50%);
        }

        .menu-item:hover::after {
            width: 80%;
        }

        .menu-item:hover {
            background: rgba(0,0,0,0.03);
            transform: translateX(10px);
        }

        .step-num {
            font-size: 1.5rem;
            color: var(--shuiro);
            margin-right: 20px;
            font-style: italic;
            font-weight: bold;
        }

        .menu-text {
            text-align: left;
        }

        .menu-title {
            display: block;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .menu-sub {
            display: block;
            font-size: 0.8rem;
            color: #777;
        }

        /* フッター */
        .footer {
            margin-top: 50px;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="scroll-container">
        <div class="hanko">合格</div>
        
        <div class="header">
            <h1>虎の巻</h1>
            <div class="subtitle">CCNP Enterprise ネットワーク 秘伝演習</div>
        </div>

        <div class="menu-list">
            <a href="https://script.google.com/macros/s/AKfycbw9BUxsBLmPblsOS9fEbip-mhDuCwT9rK9AlL-YYQSK05f2OtH1PJjC3eV2JZXGr1Kf/exec" class="menu-item">
                <span class="step-num">壱</span>
                <div class="menu-text">
                    <span class="menu-title">知識の練武（選択問題）</span>
                    <span class="menu-sub">多肢選択により基礎知識を磨く</span>
                </div>
            </a>

            <a href="https://script.google.com/macros/s/AKfycbxk8VFIUYiFcixl1uJwNZQv6C9b0QTwfbNt3f0dLLdAYMFSfV6gWj5WEKB0WzhnNt3N/exec" class="menu-item">
                <span class="step-num">弐</span>
                <div class="menu-text">
                    <span class="menu-title">仕分の試練（Drag & Drop）</span>
                    <span class="menu-sub">項目を分類し正解を導き出す</span>
                </div>
            </a>

            <a href="simulation.html" class="menu-item">
                <span class="step-num">参</span>
                <div class="menu-text">
                    <span class="menu-title">実機の極意（Simulation）</span>
                    <span class="menu-sub">仮想端末にて構築の術を修める</span>
                </div>
            </a>
        </div>

        <div class="footer">
            令和八年三月吉日改訂
        </div>
    </div>

</body>
</html>
