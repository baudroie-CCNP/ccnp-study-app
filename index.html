<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCNP Training Hub</title>
    <style>
        /* --- 基本設定 --- */
        :root {
            --bg-color: #f5f5f7; /* Apple風の薄いグレー */
            --main-white: #ffffff;
            --text-dark: #1d1d1f; /* 深い墨色 */
            --text-gray: #86868b;
            --accent-blue: #0066cc; /* 知的なビジネスブルー */
            --border-color: #d2d2d7;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* --- メインカード --- */
        .container {
            background: var(--main-white);
            width: 90%;
            max-width: 600px;
            padding: 60px 40px;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
            text-align: center;
        }

        /* --- タイトルセクション --- */
        .header {
            margin-bottom: 50px;
        }

        .category-tag {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--accent-blue);
            text-transform: uppercase;
            margin-bottom: 12px;
            display: block;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .description {
            color: var(--text-gray);
            font-size: 1rem;
            margin-top: 15px;
            line-height: 1.5;
        }

        /* --- メニューエリア --- */
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--main-white);
            border: 1px solid var(--border-color);
            padding: 20px 24px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-dark);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ホバー時の挙動 */
        .menu-item:hover {
            border-color: var(--accent-blue);
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .menu-info {
            text-align: left;
        }

        .menu-title {
            display: block;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 2px;
        }

        .menu-sub {
            display: block;
            font-size: 0.85rem;
            color: var(--text-gray);
        }

        /* 矢印アイコン */
        .arrow {
            color: var(--border-color);
            font-size: 1.2rem;
            transition: color 0.2s;
        }

        .menu-item:hover .arrow {
            color: var(--accent-blue);
        }

        /* 下部のフッター */
        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: var(--text-gray);
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <span class="category-tag">CCNP Certification Kit</span>
            <h1>虎の巻</h1>
            <p class="description">ネットワークエンジニアのための<br>実践的演習プラットフォーム</p>
        </div>

        <div class="menu-list">
            <a href="https://script.google.com/macros/s/AKfycbyBfYSZmrJbqNWtj0Q0WRsRKpxCa8orfGzqLvegVCysXpCBr6Q-OXUiInrbngWgX0AgMQ/exec" class="menu-item">
                <div class="menu-info">
                    <span class="menu-title">Knowledge Base</span>
                    <span class="menu-sub">選択形式による知識の定着</span>
                </div>
                <span class="arrow">→</span>
            </a>

            <a href="https://script.google.com/macros/s/AKfycbxDcBNBZNF833OAlInFFQx7IPt52IQ731kP5WrZkZuoVJh-BxEZQ8NtS7b6DywXE3iL/exec" class="menu-item">
                <div class="menu-info">
                    <span class="menu-title">Drag & Drop</span>
                    <span class="menu-sub">カテゴリ分類とマッチング</span>
                </div>
                <span class="arrow">→</span>
            </a>

            <a href="simulation.html" class="menu-item">
                <div class="menu-info">
                    <span class="menu-title">Lab Simulation</span>
                    <span class="menu-sub">ターミナル操作と実機構築</span>
                </div>
                <span class="arrow">→</span>
            </a>
        </div>

        <div class="footer">
            &copy; 2026 CCNP Study Group. All rights reserved.
        </div>
    </div>

</body>
</html>
