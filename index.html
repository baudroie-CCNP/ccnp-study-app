    <meta charset="UTF-8">

    <style>
        :root {
            --card-bg: rgba(255, 255, 255, 0.95); /* ボタンの背景はほぼ白（読みやすさのため） */
            --footer-bg: #eeeeee;
            --accent-blue: #007aff;
            --text-dark: #1d1d1f;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            /* ② 背景画像を透過させず、そのまま表示 */
            background-image: url('images/background_pattern.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* スクロールしても背景は固定 */
            background-repeat: no-repeat;
        }

        /* 透過用のオーバーレイ（膜）を削除、または完全に透明にする */
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* 背景がハッキリ見える分、コンテンツの視認性を上げるための設定 */
        }

        .content-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            width: 100%;
        }

        /* ① タイトルロゴ */
        .header-logo {
            width: 100%;
            max-width: 500px;
            margin-bottom: 50px;
            text-align: center;
        }
        .header-logo img {
            width: 100%;
            height: auto;
            /* 背景がハッキリしているため、ロゴに強い影をつけて浮き立たせる */
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        /* ③ ボタンエリア */
        .menu-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn-portal {
            background: var(--card-bg);
            border: none;
            border-radius: 16px;
            padding: 22px;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 700;
            font-size: 1.15rem;
            text-align: center;
            transition: 0.3s;
            /* ボタンが背景に埋もれないよう、ハッキリとした影をつける */
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }

        .btn-portal:hover {
            background: #ffffff;
            color: var(--accent-blue);
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        /* ④ お問い合わせ窓口（欄外グレーエリア） */
        .contact-section {
            background-color: var(--footer-bg);
            width: 100%;
            padding: 50px 0;
            text-align: center;
            border-top: 1px solid #ccc;
        }

        .contact-section h2 {
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: #333;
        }

        .contact-btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            padding: 0 20px;
        }

        .btn-contact {
            background: #ffffff;
            border: 1px solid #999;
            color: #555;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-contact:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            background: #fdfdfd;
        }

        .copyright {
            font-size: 0.75rem;
            color: #777;
            margin-top: 30px;
        }
    </style>
</head>

                <a href="#" target="_blank" class="btn-contact">試験後フィードバック</a>
            </div>
            <div class="copyright">&copy; 2026 CCNP 虎の巻 Project</div>
