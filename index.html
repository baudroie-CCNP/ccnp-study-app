<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCNP 虎の巻 - Portal -</title>
    <style>
        :root {
            --main-bg: #f5f5f7;
            --card-bg: #ffffff;
            --footer-bg: #e5e5e5; /* お問い合わせ欄用のグレー */
            --accent-blue: #0066cc;
            --text-dark: #1d1d1f;
            --text-gray: #86868b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: var(--main-bg);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            /* ② 背景画像の挿入（透過度は画像自体の加工またはopacityで調整） */
            background-image: url('images/background_pattern.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        /* 全体を包むメインエリア */
        .wrapper {
            flex: 1; /* フッターを下に押し下げるため */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
        }

        /* ① タイトル画像エリア */
        .header-logo {
            width: 90%;
            max-width: 600px;
            margin-bottom: 40px;
        }
        .header-logo img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        /* ③ ボタン配置エリア */
        .menu-container {
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 60px;
        }

        .btn-portal {
            background: var(--card-bg);
            border: 1px solid #d2d2d7;
            border-radius: 14px;
            padding: 20px;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 1.1rem;
            text-align: center;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .btn-portal:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        /* ④ お問い合わせ窓口（フッターエリア） */
        .contact-section {
            background-color: var(--footer-bg);
            padding: 40px 20px;
            text-align: center;
            border-top: 1px solid #ccc;
        }

        .contact-section h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #333;
        }

        .contact-btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn-contact {
            background: #fff;
            border: 1px solid #999;
            color: #555;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .btn-contact:hover {
            background: #f0f0f0;
            color: var(--accent-blue);
            border-color: var(--accent-blue);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="header-logo">
            <img src="images/title_logo.jpg" alt="虎の巻 タイトルロゴ">
        </div>

        <div class="menu-container">
            <a href="https://script.google.com/macros/s/AKfycbw9BUxsBLmPblsOS9fEbip-mhDuCwT9rK9AlL-YYQSK05f2OtH1PJjC3eV2JZXGr1Kf/exec" class="btn-portal">選択問題</a>
            <a href="https://script.google.com/macros/s/AKfycbxk8VFIUYiFcixl1uJwNZQv6C9b0QTwfbNt3f0dLLdAYMFSfV6gWj5WEKB0WzhnNt3N/exec" class="btn-portal">Drag & Drop</a>
            <a href="simulation.html" class="btn-portal">Simulation</a>
        </div>
    </div>

    <div class="contact-section">
        <h2>お問い合わせ窓口</h2>
        <div class="contact-btn-group">
            <a href="#" class="btn-contact">不具合報告/機能改善リクエストはこちら</a>
            <a href="#" class="btn-contact">試験後フィードバックはこちら</a>
        </div>
        <p style="font-size: 0.7rem; color: #999; margin-top: 20px;">&copy; 2026 CCNP 虎の巻 Project</p>
    </div>

</body>
</html>
