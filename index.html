<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCNP 虎の巻 - Portal -</title>
    <style>
        :root {
            --main-white: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.9); /* 少し透ける白 */
            --footer-bg: #eeeeee;
            --accent-blue: #007aff;
            --text-dark: #1d1d1f;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        /* ② 背景画像の設定 */
        .bg-image {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* 画像のパスを確認してください */
            background-image: url('images/background_pattern.png');
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        /* 背景を暗く/薄くして文字を読みやすくする「膜」 */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.6); /* 白い膜（0.6を小さくすると透明に近づく） */
            z-index: -1;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .content-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            width: 100%;
        }

        /* ① タイトルロゴ */
        .header-logo {
            width: 100%;
            max-width: 500px;
            margin-bottom: 40px;
            text-align: center;
        }
        .header-logo img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        /* ③ ボタンエリア */
        .menu-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-portal {
            background: var(--card-bg);
            backdrop-filter: blur(5px); /* 背景をぼかすおしゃれ効果 */
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 12px;
            padding: 18px;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 1.1rem;
            text-align: center;
            transition: 0.25s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .btn-portal:hover {
            background: var(--main-white);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* ④ お問い合わせ窓口（欄外グレーエリア） */
        .contact-section {
            background-color: var(--footer-bg);
            width: 100%;
            padding: 50px 0;
            text-align: center;
            border-top: 1px solid #ddd;
        }

        .contact-section h2 {
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: #444;
        }

        .contact-btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            padding: 0 20px;
        }

        .btn-contact {
            background: #ffffff;
            border: 1px solid #bbb;
            color: #666;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .btn-contact:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .copyright {
            font-size: 0.7rem;
            color: #999;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>
    <div class="bg-overlay"></div>

    <div class="wrapper">
        <div class="content-main">
            <div class="header-logo">
                <img src="images/title_logo.png" alt="虎の巻 ロゴ">
            </div>

            <div class="menu-container">
                <a href="https://script.google.com/macros/s/AKfycbw9BUxsBLmPblsOS9fEbip-mhDuCwT9rK9AlL-YYQSK05f2OtH1PJjC3eV2JZXGr1Kf/exec" class="btn-portal">選択問題</a>
                <a href="https://script.google.com/macros/s/AKfycbxk8VFIUYiFcixl1uJwNZQv6C9b0QTwfbNt3f0dLLdAYMFSfV6gWj5WEKB0WzhnNt3N/exec" class="btn-portal">Drag & Drop</a>
                <a href="simulation.html" class="btn-portal">Simulation</a>
            </div>
        </div>

        <div class="contact-section">
            <h2>お問い合わせ窓口</h2>
            <div class="contact-btn-group">
                <a href="#" class="btn-contact">不具合報告 / 機能改善リクエスト</a>
                <a href="#" class="btn-contact">試験後フィードバック</a>
            </div>
            <div class="copyright">&copy; 2026 CCNP 虎の巻 Project</div>
        </div>
    </div>

</body>
</html>
