<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCNP Simulation Lab - Professional Edition</title>
    <style>
        :root {
            --bg-dark: #1e1e1e; --card-bg: #2d2d2d; --accent: #007aff;
            --text-color: #cccccc; --terminal-green: #00ff00; --pass: #28a745; --fail: #dc3545;
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-dark); color: var(--text-color); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .btn { border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: bold; color: #fff; transition: 0.2s; }
        .back-btn { background: #444; } .judge-btn { background: var(--accent); } .log-btn { background: #6c757d; }
        .nav-btn { background: #333; border: 1px solid #555; }
        .btn:hover { opacity: 0.8; }

        /* ログイン画面 */
        #login-screen { display: flex; height: 100vh; flex-direction: column; justify-content: center; align-items: center; }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 12px; border: 1px solid #444; width: 300px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-input { width: 100%; padding: 12px; margin-bottom: 15px; box-sizing: border-box; border-radius: 4px; border: 1px solid #555; background: #222; color: #fff; font-size: 1rem; }
        .login-input:focus { outline: none; border-color: var(--accent); }

        /* 選択画面 (初期状態は非表示) */
        #selection-screen { display: none; height: 100vh; overflow-y: auto; padding: 40px 20px; flex-direction: column; align-items: center; }
        .lab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; margin-top: 30px; }
        .lab-card { background: var(--card-bg); border: 1px solid #444; border-radius: 12px; padding: 20px; cursor: pointer; transition: 0.3s; }
        .lab-card:hover { border-color: var(--accent); transform: translateY(-3px); }

        .contact-section { margin-top: 60px; padding: 30px; border-top: 1px solid #444; text-align: center; width: 100%; max-width: 800px; }
        .contact-btn-group { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-contact { display: inline-block; padding: 12px 24px; background-color: #333; color: #fff; text-decoration: none; border-radius: 6px; font-size: 0.9rem; border: 1px solid #555; transition: 0.3s; }
        .btn-contact:hover { background-color: var(--accent); border-color: var(--accent); }
        .copyright { font-size: 0.8rem; color: #666; }

        /* 演習画面 */
        #lab-screen { display: none; height: 100vh; width: 100vw; flex-direction: column; }
        .top-nav { background: #111; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; }
        .split-container { display: flex; flex: 1; overflow: hidden; }
        #left-panel { width: 35%; min-width: 250px; background: #252526; display: flex; flex-direction: column; border-right: 1px solid #111; }
        #right-panel { flex: 1; background: #000; display: flex; flex-direction: column; overflow: hidden; }
        .resizer { width: 6px; cursor: col-resize; background: #333; }
        
        .tab-bar { display: flex; background: #2d2d2d; border-bottom: 1px solid #111; }
        .tab { padding: 12px 20px; cursor: pointer; font-size: 0.8rem; border-right: 1px solid #111; color: #888; }
        .tab.active { background: #3d3d3d; color: #fff; border-bottom: 2px solid var(--accent); }
        .tab-content { flex: 1; padding: 20px; overflow-y: auto; display: none; line-height: 1.6; }
        .tab-content.active { display: block; }

        .terminal-wrapper { flex: 1; display: flex; flex-direction: column; padding: 15px; font-family: 'Consolas', monospace; overflow: hidden; }
        .history { flex: 1; overflow-y: auto; margin-bottom: 0; white-space: pre-wrap; color: #fff; font-size: 14px; padding-bottom: 10px; }
        .input-line { display: flex; align-items: center; border-top: 1px solid #333; padding-top: 10px; flex-shrink: 0; background: #000; }
        .prompt { color: var(--terminal-green); font-weight: bold; margin-right: 8px; }
        #cmd-input { background: transparent; border: none; color: var(--terminal-green); font-size: 1rem; outline: none; width: 100%; font-family: inherit; }

        .device-block { margin-bottom: 25px; }
        .device-header { color: var(--accent); border-bottom: 1px solid #444; padding-bottom: 5px; margin-bottom: 10px; font-weight: bold; font-size: 1.1rem; }
        .cmd-row { display: flex; align-items: center; padding-left: 10px; margin-bottom: 6px; font-size: 0.9rem; border-bottom: 1px dashed #333; padding-bottom: 4px; }
        .cmd-text { flex: 1; color: #bbb; }
        .pass-text { color: var(--pass); font-weight: bold; }
        .fail-text { color: var(--fail); font-weight: bold; }
        #loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 100; flex-direction: column; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div style="font-size: 1.2rem; font-weight: bold; margin-bottom: 10px;" id="loading-text">Loading System...</div>
</div>

<div id="login-screen">
    <div class="login-box">
        <h2 style="margin-top:0; color:var(--accent);">システムログイン</h2>
        <input type="text" id="login-name" class="login-input" placeholder="ユーザーID">
        <input type="password" id="login-pass" class="login-input" placeholder="パスワード" style="margin-bottom:20px;">
        <button class="btn judge-btn" style="width:100%; padding:12px; font-size:1rem;" onclick="attemptLogin()">ログイン</button>
        <div id="login-error" style="color:var(--fail); margin-top:15px; font-size:0.9rem;"></div>
    </div>
</div>

<div id="selection-screen">
    <h1>Simulation Lab Selection</h1>
    <div class="lab-grid" id="lab-list"></div>

    <div class="contact-section">
        <h2>お問い合わせ窓口</h2>
        <div class="contact-btn-group">
            <a href="https://docs.google.com/forms/d/フォームのID/viewform" target="_blank" rel="noopener noreferrer" class="btn-contact">不具合報告 / 機能改善リクエスト</a>
            <a href="https://docs.google.com/document/d/ドキュメントのID/edit" target="_blank" rel="noopener noreferrer" class="btn-contact">本番試験前の注意事項</a>              
            <a href="https://docs.google.com/forms/d/フォームのID/viewform" target="_blank" rel="noopener noreferrer" class="btn-contact">試験後フィードバック</a>
        </div>
        <div class="copyright">&copy; 2026 CCNP 虎の巻 Project</div>
    </div>
</div>

<div id="lab-screen">
    <div class="top-nav">
        <div style="display:flex; gap:10px; align-items:center;">
            <button class="btn back-btn" onclick="exitLab()">← Menu</button>
            <button class="btn nav-btn" onclick="navLab(-1)">前の問題</button>
            <button class="btn nav-btn" onclick="navLab(1)">次の問題</button>
            <span id="active-lab-title" style="margin-left:10px; font-weight:bold;">Lab</span>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn log-btn" onclick="downloadLog()">ログ出力</button>
            <button class="btn judge-btn" onclick="confirmJudge()">採点</button>
        </div>
    </div>
    <div class="split-container">
        <div id="left-panel">
            <div class="tab-bar">
                <div class="tab active" onclick="switchLeftTab(0)">問題文</div>
                <div class="tab" onclick="switchLeftTab(1)">構成図</div>
                <div class="tab" onclick="switchLeftTab(2)">タスク</div>
                <div class="tab" onclick="switchLeftTab(3)">結果</div>
            </div>
            <div id="l-cnt-0" class="tab-content active"></div>
            <div id="l-cnt-1" class="tab-content" style="text-align:center;"><img id="sim-diagram" src="" style="max-width:100%;"></div>
            <div id="l-cnt-2" class="tab-content"></div>
            <div id="l-cnt-3" class="tab-content"><div id="judgement-display">採点ボタンを押すと結果が表示されます。</div></div>
        </div>
        <div class="resizer" id="dragMe"></div>
        <div id="right-panel">
            <div class="tab-bar" id="device-tabs"></div>
            <div class="terminal-wrapper">
                <div id="terminal-history" class="history"></div>
                <div class="input-line">
                    <span id="current-prompt" class="prompt">R1></span>
                    <input type="text" id="cmd-input" autofocus autocomplete="off" spellcheck="false">
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyPU0g3OuYVoEicnnTikmSYtTHC0Cgp4i_-mErWe7kEbyQbtDTvBki_1PNAhIChW2m2/exec"; // ★必ず最新のデプロイURLに書き換えてください

    let labs = [], commandDict = [], currentLab = null, deviceState = {}, activeId = '';
    let currentUser = null; // ログインユーザー情報

    window.onload = () => {
        // 初期ロード時はログイン画面を表示
        document.getElementById('loading-overlay').style.display = 'none';
        history.replaceState({page: "login"}, "");
        
        // Enterキーでログインできるようにする
        document.getElementById('login-pass').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') attemptLogin();
        });
    };

    // ★ログイン処理
    async function attemptLogin() {
        const name = document.getElementById('login-name').value;
        const pass = document.getElementById('login-pass').value;
        
        if (!name || !pass) {
            document.getElementById('login-error').innerText = "ユーザーIDとパスワードを入力してください";
            return;
        }

        document.getElementById('loading-text').innerText = "認証中...";
        document.getElementById('loading-overlay').style.display = 'flex';

        try {
            // 1. GASにログイン認証をリクエスト
            const loginRes = await fetch(`${GAS_URL}?type=login&name=${encodeURIComponent(name)}&pass=${encodeURIComponent(pass)}`);
            const loginData = await loginRes.json();

            if (!loginData.success) {
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('login-error').innerText = loginData.error;
                return;
            }

            currentUser = loginData; // ユーザー情報を保持

            // 2. 認証成功後、問題データを取得
            document.getElementById('loading-text').innerText = "問題データを読み込み中...";
            const [r1, r2] = await Promise.all([ 
                fetch(GAS_URL + "?type=simList"), 
                fetch(GAS_URL + "?type=cmdDict") 
            ]);
            labs = await r1.json(); 
            commandDict = await r2.json();

            // 3. 画面の切り替え
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('selection-screen').style.display = 'flex';
            
            history.pushState({page: "menu"}, "");
            renderSelectionScreen();
        } catch (e) { 
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('login-error').innerText = "通信エラーが発生しました。URLを確認してください。";
        }
    }

    window.onpopstate = (event) => {
        if (document.getElementById('lab-screen').style.display === 'flex') {
            if (confirm("Menuに戻りますか？現在の作業内容は消去されます。")) {
                exitLab();
            } else {
                history.pushState({page: "lab"}, "");
            }
        } else if (document.getElementById('selection-screen').style.display === 'flex') {
            // 選択画面で戻るを押した場合はログイン画面に戻さない（または確認を出す）
            history.pushState({page: "menu"}, "");
        }
    };

    function renderSelectionScreen() {
        const list = document.getElementById('lab-list'); list.innerHTML = '';
        labs.forEach(lab => {
            const card = document.createElement('div'); card.className = 'lab-card';
            card.onclick = () => startLab(lab);
            card.innerHTML = `<span style="color:var(--accent);font-size:0.8rem;">Sim ${lab.id}</span><div style="font-weight:bold;margin-top:5px;">${lab.title}</div>`;
            list.appendChild(card);
        });
    }

    function startLab(lab) {
        currentLab = lab;
        history.pushState({page: "lab"}, "");
        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('lab-screen').style.display = 'flex';
        document.getElementById('active-lab-title').innerText = lab.title;
        document.getElementById('l-cnt-0').innerHTML = `<h3>概要</h3><p>${(lab.desc||"").replace(/\n/g,'<br>')}</p>`;
        document.getElementById('l-cnt-2').innerHTML = `<h3>Tasks</h3><p>${(lab.task||"").replace(/\n/g,'<br>')}</p>`;
        document.getElementById('sim-diagram').src = `simulation/sim${lab.id}.png`;
        document.getElementById('judgement-display').innerText = "採点ボタンを押すと結果が表示されます。";

        const tabsEl = document.getElementById('device-tabs'); tabsEl.innerHTML = '';
        deviceState = {};
        lab.devices.forEach((dev, idx) => {
            const name = dev.trim();
            deviceState[name] = { 
                history: `${name} Console ---\n`, 
                prompt: `${name}>`, 
                configBody: lab.initialConfigs[name] || "!", 
                currentPath: [], 
                currentInput: "",
                cmdHistory: [],
                historyIndex: -1
            };
            const t = document.createElement('div');
            t.className = "tab " + (idx === 0 ? "active" : "");
            t.innerText = name; t.onclick = () => switchDevice(name);
            tabsEl.appendChild(t);
        });
        switchDevice(lab.devices[0].trim());
    }

    function navLab(direction) {
        const currentIndex = labs.findIndex(l => l.id === currentLab.id);
        const nextIndex = currentIndex + direction;
        if (nextIndex >= 0 && nextIndex < labs.length) {
            if (confirm("別の問題に移動しますか？現在の履歴は失われます。")) startLab(labs[nextIndex]);
        } else alert("これ以上問題はありません。");
    }

    function checkPingStatus(pingInput) {
        if (!currentLab || !currentLab.displayAnswers) return false;
        let isConfigOk = true;
        
        for (const dev in currentLab.displayAnswers) {
            const configText = (deviceState[dev]?.configBody || "").toLowerCase();
            currentLab.displayAnswers[dev].forEach(cmd => {
                if (!configText.includes(cmd.toLowerCase().trim())) isConfigOk = false;
            });
        }
        return isConfigOk;
    }

    function handleCommand(input, dev) {
        const inputWords = input.trim().split(/\s+/);
        const lowInput = input.toLowerCase();
        if (inputWords[0] === "") return false;

        // 1. 基本コマンド（辞書不要）
        if (lowInput === "sh run" || lowInput === "show run" || lowInput === "show running-config") {
            dev.history += "Building configuration...\n\n" + dev.configBody + "\n";
            return true;
        }
        if (lowInput.startsWith("ping")) {
            const targetIp = inputWords[1] || "unknown";
            dev.history += `Type escape sequence to abort.\nSending 5, 100-byte ICMP Echos to ${targetIp}, timeout is 2 seconds:\n`;
            setTimeout(() => {
                const success = checkPingStatus(lowInput);
                dev.history += success ? "!!!!!" : ".....";
                dev.history += `\nSuccess rate is ${success ? "100" : "0"} percent.\n${dev.prompt}`;
                renderTerminal();
            }, 600);
            return true;
        }
        if (lowInput === "end") {
            dev.currentPath = [];
            dev.prompt = activeId + "#";
            return true;
        }

        // 2. 'no' コマンドの自動抽出
        let isNoCommand = false;
        let checkInputWords = inputWords;
        let checkInputText = input.trim();
        
        if (lowInput.startsWith("no ")) {
            isNoCommand = true;
            checkInputWords = inputWords.slice(1);
            checkInputText = input.substring(3).trim();
        }

        // 3. コマンドマッチング（曖昧判定・変数対応）
        let possibleMatches = [];
        let exactMatch = null;

        for (let cmd of commandDict) {
            const cmdWords = cmd.pattern.split(/\s+/);
            const isCorrectPrompt = (!cmd.prompt || cmd.prompt.toLowerCase() === "any" || dev.prompt.includes(cmd.prompt));
            if (!isCorrectPrompt) continue;

            let isMatch = true;
            let isExact = true;

            if (cmdWords.length !== checkInputWords.length && !cmd.pattern.includes("{")) continue;

            for (let i = 0; i < cmdWords.length; i++) {
                const cw = cmdWords[i].toLowerCase(); 
                const iw = (checkInputWords[i] || "").toLowerCase();

                if (cw.startsWith("{")) continue; 

                if (iw.length >= 1 && cw.startsWith(iw)) {
                    if (cw !== iw) isExact = false;
                    continue;
                }
                isMatch = false; break;
            }

            if (isMatch) {
                possibleMatches.push(cmd);
                if (isExact) exactMatch = cmd;
            }
        }

        let targetCmd = exactMatch || (possibleMatches.length === 1 ? possibleMatches[0] : null);

        if (possibleMatches.length > 1 && !exactMatch) {
            dev.history += `% Ambiguous command:  "${input}"\n`;
            return true; 
        }

        if (targetCmd) {
            if (targetCmd.type === "表示") {
                dev.history += (targetCmd.output || "") + "\n";
            } else if (targetCmd.type === "モード切替") {
                if (isNoCommand) {
                    dev.history += "% Incomplete command.\n"; 
                } else {
                    dev.currentPath.push(checkInputText);
                    let sfx = "config"; 
                    const low0 = checkInputWords[0].toLowerCase();
                    if (low0.startsWith("int")) sfx = "config-if";
                    else if (low0.startsWith("line")) sfx = "config-line";
                    else if (low0.startsWith("rou")) sfx = "config-router";
                    else if (low0.startsWith("vla")) sfx = "config-vlan";
                    dev.prompt = activeId + "(" + sfx + ")#";
                }
            } else if (targetCmd.type === "設定") {
                const indent = " ".repeat(dev.currentPath.length + 1);
                
                let keyword = checkInputWords[0];
                if (checkInputWords.length > 1 && ["ip", "ipv6", "crypto", "mac", "spanning-tree", "switchport"].includes(keyword.toLowerCase())) {
                    keyword = checkInputWords[0] + " " + checkInputWords[1];
                }

                if (isNoCommand) {
                    updateConfig(dev, dev.currentPath, keyword, "");
                } else {
                    updateConfig(dev, dev.currentPath, keyword, indent + checkInputText);
                }
            }
            return true;
        }

        return false;
    }

    function updateConfig(dev, path, keyword, newLine) {
        const parent = path.length > 0 ? path[path.length - 1] : "";
        if (!parent) {
            const reg = new RegExp("^\\s*" + keyword + ".*", "mi");
            if (reg.test(dev.configBody)) {
                dev.configBody = (newLine==="") ? dev.configBody.replace(reg, "").trim() : dev.configBody.replace(reg, newLine);
            } else if (newLine !== "") {
                dev.configBody += "\n" + newLine;
            }
        } else {
            const sReg = new RegExp("(" + parent + "[\\s\\S]*?)(^!|(?=^\\w))", "mi");
            if (sReg.test(dev.configBody)) {
                dev.configBody = dev.configBody.replace(sReg, (m, c, f) => {
                    const lReg = new RegExp("^\\s*" + keyword + ".*", "mi");
                    if (lReg.test(c)) return (newLine==="") ? c.replace(lReg, "").trimEnd() + "\n" + f : c.replace(lReg, newLine) + f;
                    else return newLine !== "" ? c.trimEnd() + "\n" + newLine + "\n" + f : c + f;
                });
            } else if (newLine !== "") {
                dev.configBody = dev.configBody.trimEnd() + "\n" + path.join("\n ") + "\n " + newLine + "\n!\n";
            }
        }
    }

    function runJudge() {
        if (!currentLab) return;
        const displayAnswers = currentLab.displayAnswers; 
        
        let score = 0, totalCriteria = 0;
        let html = `<h3>採点詳細 (正解コンフィグとの差分)</h3>`;

        if (displayAnswers && typeof displayAnswers === 'object' && Object.keys(displayAnswers).length > 0) {
            for (const dev in displayAnswers) {
                html += `<div class="device-block"><div class="device-header">■ ${dev}</div>`;
                
                const configText = (deviceState[dev]?.configBody || "").toLowerCase();

                displayAnswers[dev].forEach(dCmd => {
                    totalCriteria++;
                    const isOk = configText.includes(dCmd.toLowerCase().trim());
                    if (isOk) score++;
                    
                    html += `
                    <div class="cmd-row">
                        <span class="cmd-text">└ ${dCmd}</span>
                        <span class="${isOk ? 'pass-text' : 'fail-text'}" style="width:30px; text-align:right;">${isOk ? '○' : '×'}</span>
                    </div>`;
                });
                html += '</div>';
            }
        } else {
            html += "<p>表示用の正解データがありません。</p>";
        }

        const scoreHtml = `
            <div style="background: #333; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 25px;">
                <div style="font-size: 0.8rem; color: #888;">TOTAL SCORE</div>
                <div style="font-size: 1.8rem; font-weight: bold;">${score} / ${totalCriteria}</div>
            </div>`;
        
        let tipHtml = "";
        if (currentLab.comment) {
            tipHtml = `<div style="margin-top:20px; padding:15px; background: rgba(255,255,255,0.05); border-left:4px solid var(--accent); font-size: 0.9rem;">
                        <b style="color:var(--accent);">Tips:</b><br>${currentLab.comment.replace(/\n/g, '<br>')}
                    </div>`;
        }
        document.getElementById('judgement-display').innerHTML = scoreHtml + html + tipHtml;
    }

    document.getElementById('cmd-input').addEventListener('keydown', e => {
        const dev = deviceState[activeId];
        const inputEl = e.target;
        const val = inputEl.value;

        if (e.key === 'Enter') {
            const trimmedVal = val.trim();
            const low = trimmedVal.toLowerCase();

            if (trimmedVal !== "") dev.cmdHistory.push(trimmedVal);
            dev.historyIndex = dev.cmdHistory.length;

            if (trimmedVal === "") {
                dev.history += dev.prompt + "\n";
            } else {
                dev.history += dev.prompt + " " + trimmedVal + "\n";
                if (low === "en" || low === "enable") dev.prompt = activeId + "#";
                else if (low === "conf t" || low === "configure terminal") { dev.prompt = activeId + "(config)#"; dev.currentPath = []; }
                else if (low === "exit") {
                    if (dev.currentPath.length > 0) { dev.currentPath.pop(); dev.prompt = activeId + (dev.currentPath.length > 0 ? "(config-pmap)#" : "(config)#"); }
                    else dev.prompt = dev.prompt.includes("(config)") ? activeId + "#" : activeId + ">";
                } else { 
                    if (!handleCommand(trimmedVal, dev)) dev.history += "% Unknown command or computer name, or unable to find computer address\n"; 
                }
            }
            inputEl.value = ""; 
            renderTerminal();
            e.preventDefault();
        }
        else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (dev.cmdHistory.length > 0 && dev.historyIndex > 0) {
                dev.historyIndex--;
                inputEl.value = dev.cmdHistory[dev.historyIndex];
            }
        }
        else if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (dev.historyIndex < dev.cmdHistory.length - 1) {
                dev.historyIndex++;
                inputEl.value = dev.cmdHistory[dev.historyIndex];
            } else {
                dev.historyIndex = dev.cmdHistory.length;
                inputEl.value = ""; 
            }
        }
        else if (e.key === 'Tab') {
            e.preventDefault(); 
            if (val.trim() === "") return;

            const basics = ["enable", "configure terminal", "exit", "end", "show running-config", "ping", "no", "interface", "ip address"];
            let matches = basics.filter(c => c.startsWith(val.toLowerCase()));

            for (let cmd of commandDict) {
                let cleanCmd = cmd.pattern.replace(/\{.*?\}/g, "").trim(); 
                if (cleanCmd.toLowerCase().startsWith(val.toLowerCase()) && !matches.includes(cleanCmd)) {
                    matches.push(cleanCmd);
                }
            }

            if (matches.length === 1) {
                inputEl.value = matches[0] + " "; 
            }
        }
    });

    function switchDevice(id) { 
        if(activeId) deviceState[activeId].currentInput = document.getElementById('cmd-input').value; 
        activeId = id; 
        document.querySelectorAll('#device-tabs .tab').forEach(t => {
            t.classList.toggle('active', t.innerText === id);
        });
        renderTerminal(); 
    }

    function renderTerminal() {
        const dev = deviceState[activeId];
        const historyEl = document.getElementById('terminal-history');
        historyEl.innerText = dev.history;
        document.getElementById('current-prompt').innerText = dev.prompt;
        document.getElementById('cmd-input').value = dev.currentInput || "";
        
        setTimeout(() => { historyEl.scrollTop = historyEl.scrollHeight; }, 0);
        document.getElementById('cmd-input').focus();
    }

    function switchLeftTab(idx) {
        document.querySelectorAll('#left-panel .tab').forEach((t, i) => t.classList.toggle('active', i === idx));
        document.querySelectorAll('#left-panel .tab-content').forEach((c, i) => c.classList.toggle('active', i === idx));
    }
    function confirmJudge() { if(confirm("採点を実施しますか？")) { switchLeftTab(3); runJudge(); } }
    function downloadLog() {
        if(!confirm("ログを出力しますか？")) return;
        let log = `CCNP Lab Log - ${currentLab.title} (User: ${currentUser.name})\n${new Date().toLocaleString()}\n`;
        for(let d in deviceState) log += `\n[${d}]\n${deviceState[d].history}`;
        const b = new Blob([log], {type:'text/plain'}); const u = URL.createObjectURL(b);
        const a = document.createElement('a'); a.href = u; a.download = `Log_${currentLab.id}.txt`; a.click();
    }
    function exitLab() { 
        document.getElementById('selection-screen').style.display='flex'; 
        document.getElementById('lab-screen').style.display='none'; 
        history.pushState({page: "menu"}, "");
    }
    const resizer = document.getElementById('dragMe');
    resizer.onmousedown = (e) => {
        document.onmousemove = (ev) => { let w = (ev.clientX/window.innerWidth)*100; if(w>15 && w<70) document.getElementById('left-panel').style.width = w+'%'; };
        document.onmouseup = () => document.onmousemove = null;
    };
</script>
</body>
</html>
