<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCNP Lab Simulation - Multi-Device</title>
    <style>
        :root {
            --bg-dark: #1e1e1e;
            --tab-bg: #2d2d2d;
            --tab-active: #3d3d3d;
            --accent: #007aff;
            --text-color: #cccccc;
            --terminal-green: #00ff00;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg-dark); color: var(--text-color);
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }

        .split-container { display: flex; height: 100vh; width: 100vw; }

        /* 左パネル */
        #left-panel { width: 35%; min-width: 250px; background: #252526; display: flex; flex-direction: column; border-right: 1px solid #111; }
        
        /* 右パネル */
        #right-panel { flex: 1; min-width: 300px; background: #000; display: flex; flex-direction: column; }

        /* 分割線 */
        .resizer { width: 6px; cursor: col-resize; background: #333; transition: 0.2s; }
        .resizer:hover { background: var(--accent); }

        /* タブデザイン */
        .tab-bar { display: flex; background: var(--tab-bg); border-bottom: 1px solid #111; overflow-x: auto; }
        .tab {
            padding: 12px 20px; cursor: pointer; font-size: 0.8rem;
            border-right: 1px solid #111; white-space: nowrap; transition: 0.2s;
        }
        .tab:hover { background: #3a3a3a; }
        .tab.active { background: var(--tab-active); color: #fff; border-bottom: 2px solid var(--accent); }

        /* コンテンツ表示エリア */
        .tab-content { flex: 1; padding: 20px; overflow-y: auto; display: none; line-height: 1.6; }
        .tab-content.active { display: block; }

        /* ターミナルエリア */
        .terminal-wrapper { flex: 1; display: flex; flex-direction: column; padding: 15px; background: #000; font-family: 'Consolas', 'Monaco', monospace; }
        .history { flex: 1; overflow-y: auto; margin-bottom: 10px; white-space: pre-wrap; color: #fff; }
        .input-line { display: flex; align-items: center; border-top: 1px solid #222; padding-top: 10px; }
        .prompt { color: var(--terminal-green); font-weight: bold; margin-right: 8px; white-space: nowrap; }
        #cmd-input {
            background: transparent; border: none; color: var(--terminal-green);
            font-family: inherit; font-size: 1rem; outline: none; width: 100%;
        }

        .diagram-container { text-align: center; }
        .diagram-img { max-width: 100%; border: 1px solid #444; margin-top: 10px; }
        
        h3 { border-bottom: 1px solid #444; padding-bottom: 8px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="split-container">
    <div id="left-panel">
        <div class="tab-bar">
            <div class="tab active" onclick="switchLeftTab(0)">問題文</div>
            <div class="tab" onclick="switchLeftTab(1)">構成図</div>
            <div class="tab" onclick="switchLeftTab(2)">タスク</div>
            <div class="tab" onclick="switchLeftTab(3)">結果</div>
        </div>
        <div id="l-cnt-0" class="tab-content active">
            <h3>シナリオ</h3>
            <p>R1, R2間の接続を確立し、OSPFによるルーティングを設定してください。各インターフェースのIPアドレスは構成図を参照のこと。</p>
        </div>
        <div id="l-cnt-1" class="tab-content diagram-container">
            <h3>ネットワーク構成図</h3>
            <img src="simulation/network_diagram.png" class="diagram-img" alt="[Image: simulation/network_diagram.png を読み込めません]">
        </div>
        <div id="l-cnt-2" class="tab-content">
            <h3>Task List</h3>
            <ol>
                <li>R1: Gi0/0 (192.168.1.1/24)</li>
                <li>R2: Gi0/0 (192.168.1.2/24)</li>
                <li>OSPF Area 0 で隣接関係を確立</li>
            </ol>
        </div>
        <div id="l-cnt-3" class="tab-content">
            <h3>判定結果</h3>
            <p id="judge-status">演習未完了</p>
        </div>
    </div>

    <div class="resizer" id="dragMe"></div>

    <div id="right-panel">
        <div class="tab-bar" id="right-tabs">
            <div class="tab active" onclick="switchDevice('R1')">R1</div>
            <div class="tab" onclick="switchDevice('R2')">R2</div>
            <div class="tab" onclick="switchDevice('SW1')">SW1</div>
        </div>
        
        <div class="terminal-wrapper">
            <div id="terminal-history" class="history"></div>
            <div class="input-line">
                <span id="current-prompt" class="prompt">R1></span>
                <input type="text" id="cmd-input" autofocus autocomplete="off" spellcheck="false">
            </div>
        </div>
    </div>
</div>

<script>
    // --- 左右分割リサイズ ---
    const resizer = document.getElementById('dragMe');
    const leftPanel = document.getElementById('left-panel');
    resizer.addEventListener('mousedown', (e) => {
        document.addEventListener('mousemove', resize);
        document.addEventListener('mouseup', () => document.removeEventListener('mousemove', resize));
    });
    function resize(e) {
        const newWidth = (e.clientX / window.innerWidth) * 100;
        if (newWidth > 10 && newWidth < 80) leftPanel.style.width = newWidth + '%';
    }

    // --- ① 機器ごとの独立管理ロジック ---
    const devices = {
        'R1': { history: "R1 Console v1.0\n", prompt: "R1>", currentInput: "", mode: "user" },
        'R2': { history: "R2 Console v1.0\n", prompt: "R2>", currentInput: "", mode: "user" },
        'SW1': { history: "SW1 Console v1.0\n", prompt: "SW1>", currentInput: "", mode: "user" }
    };
    let activeId = 'R1';

    const inputField = document.getElementById('cmd-input');
    const historyArea = document.getElementById('terminal-history');
    const promptArea = document.getElementById('current-prompt');

    // 左タブ切り替え
    function switchLeftTab(idx) {
        document.querySelectorAll('#left-panel .tab').forEach((t, i) => t.classList.toggle('active', i === idx));
        document.querySelectorAll('#left-panel .tab-content').forEach((c, i) => c.classList.toggle('active', i === idx));
    }

    // 右デバイス切り替え (①のメイン機能)
    function switchDevice(id) {
        // 現在の入力内容を保存してから切り替え
        devices[activeId].currentInput = inputField.value;

        activeId = id;

        // タブの見た目更新
        document.querySelectorAll('#right-panel .tab').forEach(t => {
            t.classList.toggle('active', t.innerText === id);
        });

        // データの復元
        historyArea.innerText = devices[id].history;
        promptArea.innerText = devices[id].prompt;
        inputField.value = devices[id].currentInput;
        
        historyArea.scrollTop = historyArea.scrollHeight;
        inputField.focus();
    }

    // コマンド実行
    inputField.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            const cmd = inputField.value.trim();
            const dev = devices[activeId];

            if (cmd !== "") {
                dev.history += dev.prompt + " " + cmd + "\n";
                
                // 擬似コマンド判定
                const lowerCmd = cmd.toLowerCase();
                if (lowerCmd === "en" || lowerCmd === "enable") {
                    dev.prompt = activeId + "#";
                } else if (lowerCmd === "conf t" || lowerCmd === "configure terminal") {
                    dev.prompt = activeId + "(config)#";
                } else if (lowerCmd.startsWith("int ")) {
                    dev.prompt = activeId + "(config-if)#";
                } else if (lowerCmd === "exit") {
                    dev.prompt = activeId + ">"; // 簡易戻り
                } else {
                    dev.history += "% Unknown command.\n";
                }
            } else {
                dev.history += dev.prompt + "\n";
            }

            inputField.value = "";
            dev.currentInput = "";
            historyArea.innerText = dev.history;
            promptArea.innerText = dev.prompt;
            historyArea.scrollTop = historyArea.scrollHeight;
        }
    });

    // 初期化
    window.onload = () => switchDevice('R1');
</script>

</body>
</html>
